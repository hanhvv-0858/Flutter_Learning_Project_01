name: example_flutter
description: "Flutter Basics Learning App — music discovery powered by iTunes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  provider: ^6.1.0
  go_router: ^14.8.0
  http: ^1.3.0
  shared_preferences: ^2.5.0
  sqflite: ^2.4.0
  path: ^1.9.0
  cached_network_image: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
